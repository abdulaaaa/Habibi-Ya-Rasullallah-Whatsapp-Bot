<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Habibi Ya Rasulallah Bot</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <h1 class="h3 mb-3">Habibi Ya Rasulallah</h1>
            <p class="text-muted">Admin Login</p>
        </div>

        <form id="loginForm">
            <div id="errorAlert" class="alert alert-danger d-none" role="alert">
                Invalid username or password
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <span id="loginBtnText">Login</span>
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                    <span class="visually-hidden">Loading...</span>
                </span>
            </button>
        </form>
    </div>
</div>

<script type="module">
import API_BASE_URL from './config.js';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const errorAlert = document.getElementById('errorAlert');
    const loginBtnText = document.getElementById('loginBtnText');
    const loginSpinner = document.getElementById('loginSpinner');
    const submitBtn = e.target.querySelector('button[type="submit"]');

    // Hide error and show loading
    errorAlert.classList.add('d-none');
    loginBtnText.classList.add('d-none');
    loginSpinner.classList.remove('d-none');
    submitBtn.disabled = true;

    try {
        const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            credentials: 'include', // Important for CORS with cookies
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            // Store session info
            localStorage.setItem('isAuthenticated', 'true');
            window.location.href = './dashboard.html';
        } else {
            errorAlert.classList.remove('d-none');
            loginBtnText.classList.remove('d-none');
            loginSpinner.classList.add('d-none');
            submitBtn.disabled = false;
        }
    } catch (error) {
        console.error('Login error:', error);
        errorAlert.textContent = 'Connection error. Please check if backend is running.';
        errorAlert.classList.remove('d-none');
        loginBtnText.classList.remove('d-none');
        loginSpinner.classList.add('d-none');
        submitBtn.disabled = false;
    }
});
</script>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
