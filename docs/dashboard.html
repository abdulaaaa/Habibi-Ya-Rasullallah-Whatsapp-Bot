<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Habibi Ya Rasulallah Bot</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <nav class="navbar navbar-light bg-white border-bottom mb-4">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Habibi Ya Rasulallah Bot</span>
                <div class="d-flex align-items-center gap-3">
                    <span id="whatsappStatus" class="badge bg-secondary">
                        <i class="bi bi-whatsapp me-1"></i> Checking...
                    </span>
                    <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="container-fluid">
            <!-- Messages Section -->
            <div class="row mb-3">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center">
                        <h4>Scheduled Messages</h4>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#messageModal" onclick="openAddModal()">
                            <i class="bi bi-plus-circle"></i> Add Message
                        </button>
                    </div>
                </div>
            </div>

            <!-- Messages List -->
            <div class="row">
                <div class="col-12">
                    <div id="messagesContainer">
                        <div class="text-center py-5 text-muted">
                            <div class="spinner-border" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">Loading messages...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Test Message Section -->
            <div class="row mt-4">
                <div class="col-12">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6 class="card-title">Test Message</h6>
                            <p class="text-muted small">Send a custom message immediately to the selected group</p>
                            <div class="mb-3">
                                <textarea class="form-control" id="testMessageContent" rows="3"
                                          placeholder="Enter your test message here..."></textarea>
                            </div>
                            <button class="btn btn-primary btn-sm" onclick="sendTestMessage()">
                                <i class="bi bi-send"></i> Send Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Message Modal -->
    <div class="modal fade" id="messageModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="messageForm">
                        <input type="hidden" id="messageId">

                        <div class="mb-3">
                            <label for="messageContent" class="form-label">Message Content</label>
                            <textarea class="form-control" id="messageContent" rows="4" required
                                      placeholder="Enter your message here..."></textarea>
                            <div class="form-text">Supports RTL for Arabic text</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Schedule Type</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="scheduleType" id="scheduleFixed" value="fixed" checked>
                                <label class="btn btn-outline-primary" for="scheduleFixed">Fixed Time</label>

                                <input type="radio" class="btn-check" name="scheduleType" id="schedulePrayer" value="prayer">
                                <label class="btn btn-outline-primary" for="schedulePrayer">Prayer Time</label>
                            </div>
                        </div>

                        <!-- Fixed Time Section (shown by default) -->
                        <div id="fixedTimeSection" class="mb-3">
                            <label for="sendTime" class="form-label">Send Time</label>
                            <input type="time" class="form-control" id="sendTime">
                        </div>

                        <!-- Prayer Time Section (hidden by default) -->
                        <div id="prayerTimeSection" class="mb-3" style="display: none;">
                            <label for="prayerName" class="form-label">Prayer Time</label>
                            <select class="form-select" id="prayerName">
                                <option value="fajr">10 min after Fajr</option>
                                <option value="dhuhr">10 min after Dhuhr</option>
                                <option value="asr">10 min after Asr</option>
                                <option value="maghrib">10 min after Maghrib</option>
                                <option value="isha">10 min after Isha</option>
                            </select>
                            <div class="form-text text-muted" id="prayerTimePreview">Loading prayer times...</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Days of Week</label>
                            <div class="days-checkboxes">
                                <div class="form-check">
                                    <input class="form-check-input day-checkbox" type="checkbox" value="0" id="day0">
                                    <label class="form-check-label" for="day0">Sunday</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input day-checkbox" type="checkbox" value="1" id="day1">
                                    <label class="form-check-label" for="day1">Monday</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input day-checkbox" type="checkbox" value="2" id="day2">
                                    <label class="form-check-label" for="day2">Tuesday</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input day-checkbox" type="checkbox" value="3" id="day3">
                                    <label class="form-check-label" for="day3">Wednesday</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input day-checkbox" type="checkbox" value="4" id="day4">
                                    <label class="form-check-label" for="day4">Thursday</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input day-checkbox" type="checkbox" value="5" id="day5">
                                    <label class="form-check-label" for="day5">Friday</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input day-checkbox" type="checkbox" value="6" id="day6">
                                    <label class="form-check-label" for="day6">Saturday</label>
                                </div>
                            </div>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="allDays" onchange="toggleAllDays(this)">
                                <label class="form-check-label" for="allDays">
                                    <strong>Every Day</strong>
                                </label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="isActive" checked>
                                <label class="form-check-label" for="isActive">Active</label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveMessage()">Save Message</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Dashboard Script -->
    <script src="./js/dashboard.js" type="module"></script>
</body>
</html>
